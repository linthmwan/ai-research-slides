<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每日 AI Research 投影片</title>
<style>
:root{
  --bg:#fbfbfd; --ink:#1a1d24; --ink-soft:#5b616e; --line:#e4e7ec;
  --accent:#3b5bdb; --accent-bg:#edf1ff; --card:#fff;
  --sans:-apple-system,"SF Pro Text","PingFang TC","Noto Sans TC",system-ui,"Segoe UI",Roboto,sans-serif;
  --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:880px;margin:0 auto;padding:clamp(48px,8vw,96px) clamp(24px,5vw,48px);}
.kicker{font-size:.85rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:1rem;}
h1{font-size:clamp(2rem,4.5vw,3rem);line-height:1.12;letter-spacing:-.01em;font-weight:800;}
.intro{color:var(--ink-soft);font-size:clamp(1rem,1.6vw,1.15rem);margin-top:1rem;max-width:60ch;}
.list{margin-top:clamp(2.4rem,5vw,3.6rem);display:flex;flex-direction:column;gap:1rem;}
.card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.4rem 1.6rem;transition:border-color .15s,transform .15s,box-shadow .15s;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,91,219,.08);}
.card .date{font-family:var(--mono);font-size:.82rem;color:var(--accent);font-weight:700;}
.card .title{font-size:clamp(1.15rem,2vw,1.4rem);font-weight:750;margin-top:.35rem;line-height:1.3;}
.empty{color:var(--ink-soft);}
.foot{margin-top:clamp(3rem,6vw,4.5rem);padding-top:1.6rem;border-top:1px solid var(--line);color:var(--ink-soft);font-size:.85rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Daily AI Research</div>
  <h1>每日 AI Research 投影片</h1>
  <p class="intro">每日精選一篇頂會論文或大廠技術報告，拆解方法、實驗與機制，整理成研究簡報。鍵盤左右鍵或 Space 翻頁。共 1 份。</p>

  <div class="list">
    <a class="card" href="2026-06-14/index.html">
      <div class="date">2026-06-14 · 週日</div>
      <div class="title">MiniMax Sparse Attention — AI Research Daily 2026-06-14</div>
    </a>
  </div>

  <div class="foot">由 Hermes Agent 自動生成 · 圖片經壓縮最佳化以加快載入</div>
</div>
</body>
</html>
